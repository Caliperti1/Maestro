name: Work package
description: Track a Maestro implementation work package
title: "[Work Package]: "
labels: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should this work package accomplish?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included, and what is intentionally out of scope?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that mean this issue is done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Links, docs, dependencies, or implementation hints.
